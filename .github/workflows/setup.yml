name: Environment Setup Workflow
on:
  schedule:
    - cron: '0 11 1 * *'
    
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Run the setup script
        run: python3 setup.py full
